# Netlify configuration for a static site (no build step needed)
[build]
  publish = "."

# Long-cache the image assets, always re-check the HTML
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
